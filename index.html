<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shane Conroy – Projects</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .card p {
      color: #555;
      margin-bottom: 12px;
    }

    .card a {
      text-decoration: none;
      color: #0066cc;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shane Conroy</h1>
    <p class="subtitle">Statistics graduate | Spatial analysis, modeling, and applied data projects</p>

    <div class="grid">

      <div class="card">
        <img src="helene_preview.png" alt="Hurricane Helene project">
        <h2>Hurricane Helene Spatial Analysis</h2>
        <p>Spatial regression and kriging used to model storm precipitation and generate predictions at unobserved locations.</p>
        <a href="project1.html">View Project →</a>
      </div>

      <!-- Add more projects here -->

    </div>
  </div>
</body>
</html>
