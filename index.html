<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shane Conroy – Projects</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.15s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
    }

    .card h2 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .card p {
      color: #555;
      margin: 0 0 8px 0;
      font-size: 14px;
    }

    .card a {
      text-decoration: none;
      color: #0066cc;
      font-weight: 500;
      font-size: 14px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Shane Conroy</h1>
    <p class="subtitle">Statistics graduate | Spatial analysis, modeling, and applied data projects</p>

    <div class="grid">

      <a href="helene/helene_report.html" class="card-link">
        <div class="card">
          <img src="helene_preview.png" alt="Hurricane Helene project">
          
          <div class="card-content">
            <h2>Hurricane Helene Spatial Analysis</h2>
            <p>Spatial regression and kriging used to model storm precipitation and generate predictions at unobserved locations.</p>
            <span>View Project →</span>
          </div>
        </div>
      </a>

      <!-- Add more project cards here -->

    </div>
  </div>
</body>
</html>
